aid: leaf-agriculture
name: Leaf Agriculture
description: >-
  Leaf Agriculture is the provider of a unified farm data API. The platform
  addresses the difficulty of building applications in food and agriculture
  by providing a standardized API for accessing data from multiple farm data
  sources, including field boundaries, machine operations (planting, harvest,
  application, tillage), weather data, provider integrations (John Deere,
  CNHi, Climate FieldView, Trimble), webhooks for real-time notifications,
  and Leaf Lake for SQL-based analysis of normalized farm data.
type: Index
