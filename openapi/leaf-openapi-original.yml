  /services/satellite/api/fields:
    get:
      tags:
        - API Reference > Crop Monitoring
      summary: Leaf Agriculture Get all satellite fields
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{leaf_token}}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - API Reference > Crop Monitoring
      summary: Leaf Agriculture Create a satellite field
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"assetTypes\": [\n    \"ortho_analytic_8b_sr\"\n  ],\n  \"externalId\": \"{{sat_external_id}}\",\n  \"daysBefore\":
                30,\n  \"geometry\": {\n    \"type\": \"MultiPolygon\",\n    \"coordinates\": [\n      [\n        [\n          [\n            -48.95275447,\n            -22.49608\n          ],\n          [\n            -48.95379286,\n            -22.49675703\n          ],\n          [\n            -48.9591836,\n            -22.50310243\n          ],\n          [\n            -48.96225525,\n            -22.5067235\n          ],\n          [\n            -48.94852019,\n            -22.50648371\n          ],\n          [\n            -48.94780839,\n            -22.49693998\n          ],\n          [\n            -48.95275447,\n            -22.49608\n          ]\n        ]\n      ]\n    ]\n  },\n  \"providers\": [\n    \"planet\"\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{leaf_token}}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
