          content:
            application/json: {}
  /api/oauth/token:
    post:
      tags:
        - API Reference > Providers auth > ClimateFieldView auth
      summary: Leaf Agriculture 2. Get CFV Tokens
      description: >-
        Access token (and refresh token) request as detailed on step 4 of the
        medium post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: get code from redirect url and put here
                  example: '{{cfv_code}}'
                redirect_uri:
                  type: string
                  description: 'same as when on the url you sent to user '
                  example: '{{cfv_redirect_url}}'
                grant_type:
                  type: string
                  example: authorization_code
      security:
        - noauthAuth: []
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          description: Basic base64(clientId:clientSecret)
          example: '{{cfv_auth_header}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /autenticacao:
    post:
      tags:
        - API Reference > Providers auth > Stara auth
      summary: Leaf Agriculture Get Stara API key
      requestBody:
        content:
          application/x-www-form-urlencoded:
